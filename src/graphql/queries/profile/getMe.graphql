query GetMe {
	getMe {
		avatar
		firstName
		id
		lastName
		publicId
		username
		createdAt
		email
		hasPassword
		role
	}
	getFriends {
		id
		avatar
		firstName
		lastName
		firstName
		publicId
		username
		role
	}
	getFriendRequests {
		id
		status
		from {
			id
			avatar
			publicId
			username
			role
		}
		to {
			id
			avatar
			publicId
			username
			role
		}
	}
}

query SearchUser($input: SearchUserDto!) {
	searchUser(input: $input) {
		id
		username
		avatar
		publicId
		role
	}
}

query GetUser($id: String!) {
	getUser(id: $id) {
		id
		avatar
		firstName
		lastName
		publicId
		username
		createdAt
		role
	}
}
