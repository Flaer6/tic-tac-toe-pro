<svg
					viewBox='0 0 40 40'
					fill='none'
					xmlns='http://www.w3.org/2000/svg'
					className='h-full w-full'
				>
					{/* Background */}
					<rect width='40' height='40' rx='10' fill='url(#bg)' />

					{/* Grid lines */}
					<line
						x1='14'
						y1='4'
						x2='14'
						y2='36'
						stroke='white'
						strokeOpacity='0.12'
						strokeWidth='1'
					/>
					<line
						x1='26'
						y1='4'
						x2='26'
						y2='36'
						stroke='white'
						strokeOpacity='0.12'
						strokeWidth='1'
					/>
					<line
						x1='4'
						y1='14'
						x2='36'
						y2='14'
						stroke='white'
						strokeOpacity='0.12'
						strokeWidth='1'
					/>
					<line
						x1='4'
						y1='26'
						x2='36'
						y2='26'
						stroke='white'
						strokeOpacity='0.12'
						strokeWidth='1'
					/>

					{/* X — top left cell */}
					<line
						x1='6.5'
						y1='6.5'
						x2='11.5'
						y2='11.5'
						stroke='#818cf8'
						strokeWidth='2'
						strokeLinecap='round'
					/>
					<line
						x1='11.5'
						y1='6.5'
						x2='6.5'
						y2='11.5'
						stroke='#818cf8'
						strokeWidth='2'
						strokeLinecap='round'
					/>

					{/* O — center cell */}
					<circle cx='20' cy='20' r='3.5' stroke='#fb7185' strokeWidth='2' />

					{/* X — bottom right cell */}
					<line
						x1='28.5'
						y1='28.5'
						x2='33.5'
						y2='33.5'
						stroke='#818cf8'
						strokeWidth='2'
						strokeLinecap='round'
					/>
					<line
						x1='33.5'
						y1='28.5'
						x2='28.5'
						y2='33.5'
						stroke='#818cf8'
						strokeWidth='2'
						strokeLinecap='round'
					/>

					{/* O — top right cell */}
					<circle
						cx='31'
						cy='9'
						r='3'
						stroke='#fb7185'
						strokeWidth='1.5'
						strokeOpacity='0.5'
					/>

					{/* Gradient def */}
					<defs>
						<linearGradient
							id='bg'
							x1='0'
							y1='0'
							x2='40'
							y2='40'
							gradientUnits='userSpaceOnUse'
						>
							<stop offset='0%' stopColor='#1e1b4b' />
							<stop offset='100%' stopColor='#0f0d1a' />
						</linearGradient>
					</defs>
				</svg>